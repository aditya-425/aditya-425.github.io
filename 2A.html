<!DOCTYPE html>
<html>
<head>
  <title>HTML Table</title>
</head>
<body>

<h1>HTML Table</h1>

<table border="1">
  <tr>
    <th rowspan="2">Name</th>
    <th colspan="2">Scores</th>
  </tr>
  <tr>
    <th>Math</th>
    <th>Science</th>
  </tr>
  <tr>
    <td>Alice</td>
    <td>85</td>
    <td>90</td>
  </tr>
  <tr>
    <td>Bob</td>
    <td>78</td>
    <td>88</td>
  </tr>
  <tr>
    <td>Charlie</td>
    <td>92</td>
    <td>95</td>
  </tr>
</table>

</body>
</html>

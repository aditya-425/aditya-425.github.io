/* BODY */

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ffffff;
  color: #333;
  overflow-x: hidden;
}

/* FILE INPUT */

input[type="file"] {
  background: #fff;
  padding: 8px;
  border-radius: 6px;
}

/* HEADER */

header {
  background: linear-gradient(135deg,#0f766e,#14b8a6);
  color: white;
  text-align: center;
  padding: 25px;
}

/* SECTION */

section {
  text-align: center;
  padding: 25px 15px;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

/* GRID */

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* CARDS */

/* CARDS (FRAME AROUND SECTIONS) */

.card {
  background: rgba(255,255,255,0.95);

  border-radius: 14px;
  padding: 18px;

  border: 1px solid rgba(0,0,0,0.1);

  transition: 0.3s;

  text-align: center;
}

/* Floating hover effect */

.card:hover {
  transform: translateY(-8px);

  box-shadow: 0 14px 28px rgba(0,0,0,0.15);
}

/* BUTTON LINKS */

/* BUTTONS */

.card a {

  display: block;           /* one below another */

  width: 140px;             /* same length */

  margin: 8px auto;         /* center */

  padding: 8px 0;

  background: #14b8a6;
  color: white;

  border-radius: 20px;

  text-decoration: none;

  font-size: 14px;
  font-weight: 500;

  transition: 0.25s;
}

/* Hover */

.card a:hover {

  background: #0f766e;

  transform: scale(1.05);
}
/* SUBTEXT */

.subtext {
  margin-top: 10px;
  font-size: 0.85rem;
  color: #555;
  text-align: center;
}

/* FORM */

.contact form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 500px;
  margin: auto;
}

.contact textarea {
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  resize: none;
}

.contact button {
  padding: 12px;
  background: #14b8a6;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.25s;
}

.contact button:hover {
  background: #0f766e;
}

/* POPUP */

.popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #14b8a6;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;

  opacity: 0;
  transform: translateY(30px);
  pointer-events: none;

  transition: all 0.4s ease;
}

.popup.show {
  opacity: 1;
  transform: translateY(0);
}

/* FOOTER */

footer {
  text-align: center;
  padding: 12px;
  background: #0f766e;
  color: white;
}

</style>

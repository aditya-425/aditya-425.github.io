<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff; /* white background */
  color: #333;
}

/* HEADER */
header {
  background: #0f766e; /* turquoise */
  color: white;
  text-align: center;
  padding: 20px;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

nav a:hover {
  color: #99f6e4;
}

/* SECTION */
section {
  padding: 30px 15px;
  max-width: 1100px;
  margin: auto;
}

h2 {
  text-align: center;
  color: #0f766e;
}

/* NORMAL TEXT (no glow now) */
.glow {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  color: #0f766e;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
  border: 1px solid #ddd;
}

/* POP HOVER */
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px rgba(0,0,0,0.15);
}

/* BUTTONS / LINKS */
.card a {
  display: block;
  margin: 6px 0;
  padding: 8px;
  text-align: center;
  background: #14b8a6; /* turquoise buttons */
  color: white;
  border-radius: 5px;
  text-decoration: none;
  transition: 0.3s;
}

.card a:hover {
  background: #0f766e;
}

/* FORM */
.contact input,
.contact textarea {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.contact button {
  padding: 10px;
  background: #14b8a6;
  color: white;
  border: none;
  cursor: pointer;
}

.contact button:hover {
  background: #0f766e;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #14b8a6;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 10px;
  background: #0f766e;
  color: white;
}
</style>

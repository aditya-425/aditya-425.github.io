<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STAR TERRITORY</title>

<link rel="icon" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
margin:0;
font-family:'Poppins',sans-serif;
background:#ffffff;
color:#333;
transition:0.3s;
}

body.dark {
background:#111;
color:#eee;
}

header {
background:linear-gradient(135deg,#0f766e,#14b8a6);
color:white;
text-align:center;
padding:25px;
position:relative;
}

.dark-toggle {
position:absolute;
top:15px;
right:15px;
background:white;
color:#0f766e;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

section {
text-align:center;
padding:25px 15px;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:30px;
}

.card {
background:rgba(255,255,255,0.95);
border-radius:14px;
padding:18px;
border:1px solid rgba(0,0,0,0.1);
transition:0.3s;
}

body.dark .card {
background:#1a1a1a;
}

.card a {
display:block;
width:180px;
margin:8px auto;
padding:10px 0;
background:#14b8a6;
color:white;
border-radius:20px;
text-decoration:none;
font-size:14px;
transition:0.25s;
}

.card a:hover {
background:#0f766e;
transform:scale(1.05);
}

.contact form {
display:flex;
flex-direction:column;
gap:12px;
max-width:500px;
margin:auto;
}

textarea {
padding:12px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
}

.upload-box {
display:block;
width:260px;
margin:auto;
padding:10px;
background:#14b8a6;
color:white;
border-radius:6px;
cursor:pointer;
text-align:center;
}

.upload-box input {
display:none;
}

button {
padding:12px;
background:#14b8a6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.popup {
position:fixed;
bottom:20px;
right:20px;
background:#14b8a6;
color:white;
padding:12px 20px;
border-radius:8px;
opacity:0;
transform:translateY(30px);
transition:0.4s;
}

.popup.show {
opacity:1;
transform:translateY(0);
}

footer {
text-align:center;
padding:12px;
background:#0f766e;
color:white;
}

</style>

</head>

<body>

<header>

<button class="dark-toggle"
onclick="toggleDark()">
🌙
</button>

<h1>SAVIOUR STAR</h1>

<p>Psychopath | Auraman | Criminal</p>

</header>

<section>

<h2>About Me</h2>

<p style="font-weight:700;font-size:1.5rem;">
YOUR <span style="color:#0FFF50;">SAVIOUR</span> IS HERE
</p>

</section>

<section>

<h2>My Content</h2>

<div class="grid">

<div class="card">

<h3>
<i class="fa-solid fa-file"></i>
TEXT FILES
</h3>

<a href="10A.txt" download>📄 10A</a>
<a href="10B.txt" download>📄 10B</a>
<a href="10C.txt" download>📄 10C</a>

</div>

<div class="card">

<h3>
<i class="fa-solid fa-folder"></i>
DOCUMENTS
</h3>

<a href="https://drive.google.com"
target="_blank">

🎬 Movies here

</a>

</div>

</div>

</section>

<!-- MESSAGE FORM (FORMSPREE) -->

<section class="contact">

<h2>Send Message</h2>

<form
id="message-form">

<textarea
name="message"
placeholder="Type message..."
required>
</textarea>

<button type="submit">
Send Message
</button>

</form>

</section>

<!-- FILE UPLOAD (NETLIFY) -->

<section class="contact">

<h2>Upload File</h2>

<form
name="file-upload"
method="POST"
netlify
data-netlify="true"
enctype="multipart/form-data"
action="/success.html">

<input type="hidden"
name="form-name"
value="file-upload">

<input type="hidden"
name="subject"
value="New File Upload">

<p hidden>
<label>Don't fill this out:
<input name="bot-field">
</label>
</p>

<label class="upload-box">

<span id="upload-text">
📎 Upload Photos / Videos / PDFs
</span>

<input
type="file"
name="file"
id="fileInput"
accept="image/*,video/*,.pdf"
required>

</label>

<button type="submit">
  <a href="https://shiny-sprite-5275af.netlify.app/" target="_blank">
Upload File
</a>
</button>

</form>

</section>

<div id="popup" class="popup">
MESSAGE SENT ⭐
</div>

<footer>

<p>© 2025 SAVIOUR STAR</p>

</footer>

<script>

/* DARK MODE */

function toggleDark(){
document.body.classList.toggle("dark");
}

/* FILE NAME SHOW */

const fileInput =
document.getElementById("fileInput");

const uploadText =
document.getElementById("upload-text");

if(fileInput){

fileInput.addEventListener("change",function(){

if(fileInput.files.length>0){

uploadText.textContent =
"📄 "+fileInput.files[0].name;

}

});

}

/* FORMSPREE MESSAGE */

const msgForm =
document.getElementById("message-form");

const popup =
document.getElementById("popup");

msgForm.addEventListener("submit",
async function(e){

e.preventDefault();

const data =
new FormData(msgForm);

const response =
await fetch(
"https://formspree.io/f/xdapnpgo",
{
method:"POST",
body:data,
headers:{
'Accept':'application/json'
}
});

if(response.ok){

msgForm.reset();

popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},3000);

}

else{

alert("Message failed.");

}

});

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR TERRITORY</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #222;
}

/* HEADER */
header {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

nav a:hover {
  color: #ff4d6d;
}

/* SECTIONS */
section {
  padding: 30px 15px;
  max-width: 1100px;
  margin: auto;
}

h2 {
  text-align: center;
}

/* GLOW TEXT */
.glow {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  color: #ff4d6d;
  text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #f8f8f8;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
  border: 1px solid #ddd;
}

/* POP-UP HOVER EFFECT */
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

/* LINKS */
.card a {
  display: block;
  margin: 8px 0;
  padding: 8px;
  text-align: center;
  background: #111;
  color: white;
  border-radius: 5px;
  text-decoration: none;
  transition: 0.3s;
}

.card a:hover {
  background: #ff4d6d;
}

/* FORM */
.contact form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 500px;
  margin: auto;
}

.contact input,
.contact textarea {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.contact button {
  padding: 10px;
  background: #111;
  color: white;
  border: none;
  cursor: pointer;
}

.contact button:hover {
  background: #ff4d6d;
}

/* POPUP MESSAGE */
.popup {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px black;
  animation: fadeIn 0.5s;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* FOOTER */
footer {
  text-align: center;
  padding: 10px;
  background: #111;
  color: white;
}
</style>
</head>

<body>

<script>
const form = document.getElementById("contact-form");
const popup = document.getElementById("popup");

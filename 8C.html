<!DOCTYPE html>
<html>
<head>
  <title>Print Numbers 1 to 10</title>
</head>
<body>

<h2>Printing Numbers from 1 to 10</h2>

<script>
  // Using for loop
  document.write("<p><b>Using for loop:</b></p>");
  for (let i = 1; i <= 10; i++) {
    document.write(i + " ");
  }

  // Using while loop
  document.write("<p><b>Using while loop:</b></p>");
  let j = 1;
  while (j <= 10) {
    document.write(j + " ");
    j++;
  }

  // Using do-while loop
  document.write("<p><b>Using do-while loop:</b></p>");
  let k = 1;
  do {
    document.write(k + " ");
    k++;
  } while (k <= 10);
</script>

</body>
</html>
